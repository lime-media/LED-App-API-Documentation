openapi: 3.0.0
info:
  title: LED App API
  version: 1.0.0
  description: |
    Official API documentation for the LED App.
    All protected endpoints require a Bearer JWT token in the `Authorization` header.

    **How to authenticate:**
    1. Call `POST /authentication` with your credentials.
    2. Copy the `token` from the response.
    3. Click **Authorize** and enter: `Bearer <your_token>`
  contact:
    name: Your Company Name
    email: support@yourcompany.com

servers:
  - url: https://your-api-domain.com
    description: Production server
  - url: http://localhost:3000
    description: Local development server

tags:
  - name: Authentication
    description: Login and token management
  - name: Client Programs
    description: Manage client advertising programs and their associated markets
  - name: Trucks
    description: Manage trucks and their issue history
  - name: Program Schedule
    description: Manage program schedule shifts and assignments
  - name: Markets
    description: Retrieve available markets

# ─── Security ────────────────────────────────────────────────────────────────
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ── Reusable Parameters ────────────────────────────────────────────────────
  parameters:
    ClientProgramUid:
      in: path
      name: clientProgramUid
      required: true
      schema:
        type: string
      description: Unique identifier of the client program

    TruckUid:
      in: path
      name: truckUid
      required: true
      schema:
        type: string
      description: Unique identifier of the truck

    DriverUid:
      in: path
      name: driverUid
      required: true
      schema:
        type: string
      description: Unique identifier of the driver

    ScheduleId:
      in: path
      name: id
      required: true
      schema:
        type: string
      description: Unique identifier (programScheduleUid) of the schedule entry

    LimitParam:
      in: query
      name: limit
      required: false
      schema:
        type: integer
        example: 20
      description: Maximum number of records to return

    OffsetParam:
      in: query
      name: offset
      required: false
      schema:
        type: integer
        example: 0
      description: Number of records to skip (for pagination)

  # ── Reusable Responses ─────────────────────────────────────────────────────
  responses:
    Unauthorized:
      description: Missing or invalid JWT token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadRequest:
      description: Invalid request body or parameters
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  # ── Schemas ────────────────────────────────────────────────────────────────
  schemas:

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "An error occurred"

    PaginatedMeta:
      type: object
      properties:
        success:
          type: boolean
          example: true
        count:
          type: integer
          example: 42
          description: Total number of records (before pagination)

    # ── Market ──────────────────────────────────────────────────────────────
    Market:
      type: object
      properties:
        marketUid:
          type: string
          example: "mkt-001"
        market:
          type: string
          example: "New York"
        marketTimeZone:
          type: string
          example: "America/New_York"

    # ── Client Program ───────────────────────────────────────────────────────
    ClientProgramMarket:
      type: object
      properties:
        clientProgramMarketUid:
          type: string
          example: "cpm-001"
        clientProgramUid:
          type: string
          example: "cp-001"
        market:
          type: string
          example: "New York"
        marketTimeZone:
          type: string
          example: "America/New_York"
        marketMilesDriven:
          type: number
          example: 120.5
        impressions:
          type: integer
          example: 5000

    ClientProgram:
      type: object
      properties:
        clientProgramUid:
          type: string
          example: "cp-001"
        clientUid:
          type: string
          example: "cl-001"
        programName:
          type: string
          example: "Summer Campaign 2024"
        startDate:
          type: string
          format: date
          example: "2024-06-01"
        endDate:
          type: string
          format: date
          example: "2024-08-31"
        isDeleted:
          type: integer
          enum: [0, 1]
          example: 0
        markets:
          type: array
          items:
            $ref: "#/components/schemas/ClientProgramMarket"
        aggregatedValues:
          type: object
          description: Aggregated metrics for the program (miles, impressions, etc.)

    ClientProgramCreateBody:
      type: object
      required: [clientUid, programName, startDate, endDate, markets]
      properties:
        clientUid:
          type: string
          example: "cl-001"
        programName:
          type: string
          example: "Summer Campaign 2024"
        startDate:
          type: string
          format: date
          example: "2024-06-01"
        endDate:
          type: string
          format: date
          example: "2024-08-31"
        markets:
          type: array
          description: List of markets to associate with this program
          items:
            type: object
            properties:
              market:
                type: string
                example: "New York"
              marketTimeZone:
                type: string
                example: "America/New_York"

    ClientProgramUpdateBody:
      type: object
      required: [clientProgramUid]
      properties:
        clientProgramUid:
          type: string
          example: "cp-001"
        programName:
          type: string
          example: "Updated Campaign Name"
        startDate:
          type: string
          format: date
          example: "2024-06-01"
        endDate:
          type: string
          format: date
          example: "2024-09-30"
        deletedMarkets:
          type: array
          description: UIDs of markets to remove
          items:
            type: string
          example: ["cpm-002", "cpm-003"]
        createdMarkets:
          type: array
          description: New markets to add
          items:
            $ref: "#/components/schemas/ClientProgramMarket"
        updatedMarkets:
          type: array
          description: Existing markets to update
          items:
            $ref: "#/components/schemas/ClientProgramMarket"

    # ── Truck ────────────────────────────────────────────────────────────────
    Issue:
      type: object
      properties:
        issueUid:
          type: string
          example: "iss-001"
        issueType:
          type: string
          example: "truck"
          enum: [truck, generator, computer, ledScreens]
        issue:
          type: string
          example: "Engine warning light on"
        issueMediaOriginalName:
          type: string
          example: "photo.jpg"
        issueMediaSasUrl:
          type: string
          example: "https://storage.azure.com/..."
          description: Temporary signed URL for issue media (active issues only)
        isResolved:
          type: integer
          enum: [0, 1]
          example: 0
        createdAt:
          type: string
          format: date-time

    Truck:
      type: object
      properties:
        truckUid:
          type: string
          example: "trk-001"
        truckNumber:
          type: string
          example: "T-42"
        licensePlate:
          type: string
          example: "ABC-1234"
        macAddress:
          type: string
          example: "AA:BB:CC:DD:EE:FF"
        samsaraId:
          type: string
          example: "sam-9876"
        isDeleted:
          type: integer
          enum: [0, 1]
          example: 0
        activeIssues:
          type: array
          items:
            $ref: "#/components/schemas/Issue"
        previousTruckIssues:
          type: array
          items:
            $ref: "#/components/schemas/Issue"
        previousGeneratorIssues:
          type: array
          items:
            $ref: "#/components/schemas/Issue"
        previousComputerIssues:
          type: array
          items:
            $ref: "#/components/schemas/Issue"
        previousLedScreenIssues:
          type: array
          items:
            $ref: "#/components/schemas/Issue"

    TruckCreateBody:
      type: object
      required: [licensePlate, truckNumber, macAddress]
      properties:
        truckNumber:
          type: string
          example: "T-42"
        licensePlate:
          type: string
          example: "ABC-1234"
          description: Used to look up the vehicle in Samsara. Must match a valid Samsara record.
        macAddress:
          type: string
          example: "AA:BB:CC:DD:EE:FF"

    TruckUpdateBody:
      type: object
      required: [truckUid]
      properties:
        truckUid:
          type: string
          example: "trk-001"
        truckNumber:
          type: string
          example: "T-42"
        licensePlate:
          type: string
          example: "XYZ-5678"
          description: If changed, the new plate must match a valid Samsara record.
        macAddress:
          type: string
          example: "AA:BB:CC:DD:EE:FF"
        resolvedIssueUids:
          type: array
          description: Issue UIDs to mark as resolved
          items:
            type: string
          example: ["iss-001", "iss-002"]

    NoMovementBody:
      type: object
      required: [dailyScheduleUid]
      properties:
        dailyScheduleUid:
          type: string
          example: "ds-001"
          description: Triggers a no-movement alert email to the fleet manager for the associated shift.

    # ── Program Schedule ─────────────────────────────────────────────────────
    ProgramScheduleShift:
      type: object
      properties:
        programScheduleUid:
          type: string
          example: "ps-001"
        clientUid:
          type: string
          example: "cl-001"
        clientProgramUid:
          type: string
          example: "cp-001"
        clientProgramMarketUid:
          type: string
          example: "cpm-001"
        clientArtworkSetUid:
          type: string
          example: "art-001"
        clientGpsAddressSetUid:
          type: string
          example: "gps-001"
        truckUid:
          type: string
          example: "trk-001"
        driverUid:
          type: string
          example: "drv-001"
        shiftTypeUid:
          type: string
          example: "sht-001"
        startTime:
          type: string
          format: date-time
          example: "2024-06-01T08:00:00Z"
        endTime:
          type: string
          format: date-time
          example: "2024-06-01T16:00:00Z"
        shiftDurationInMins:
          type: integer
          example: 480
        notes:
          type: string
          example: "Park near main entrance"
        shiftStartedTime:
          type: string
          format: date-time
        hasShiftCompleted:
          type: integer
          enum: [0, 1]
        noProgramSelected:
          type: integer
          enum: [0, 1]

    ProgramScheduleCreateBody:
      type: object
      required: [clientUid, clientProgramUid, clientProgramMarketUid, truckUid, driverUid, startTime, endTime, marketTimeZone]
      properties:
        clientUid:
          type: string
          example: "cl-001"
        clientProgramUid:
          type: string
          example: "cp-001"
        clientProgramMarketUid:
          type: string
          example: "cpm-001"
        clientArtworkSetUid:
          type: string
          example: "art-001"
        clientGpsAddressSetUid:
          type: string
          example: "gps-001"
        truckUid:
          type: string
          example: "trk-001"
        driverUid:
          type: string
          example: "drv-001"
        shiftTypeUid:
          type: string
          example: "sht-001"
        startTime:
          type: string
          example: "2024-06-01 08:00"
          description: Local time in the market's timezone
        endTime:
          type: string
          example: "2024-06-01 16:00"
          description: Local time in the market's timezone
        marketTimeZone:
          type: string
          example: "America/New_York"
        notes:
          type: string
          example: "Park near main entrance"
        monday:
          type: boolean
          example: true
          description: Repeat on Mondays (repeat shift only)
        tuesday:
          type: boolean
          example: false
        wednesday:
          type: boolean
          example: true
        thursday:
          type: boolean
          example: false
        friday:
          type: boolean
          example: true
        saturday:
          type: boolean
          example: false
        sunday:
          type: boolean
          example: false
        repeatEndDate:
          type: string
          format: date
          example: "2024-08-31"
          description: End date for repeating shifts
        programEndDate:
          type: string
          format: date
          example: "2024-08-31"

    ProgramScheduleUpdateBody:
      type: object
      required: [programScheduleUid, marketTimeZone]
      properties:
        programScheduleUid:
          type: string
          example: "ps-001"
        programScheduleDaysMappingUid:
          type: string
          example: "psdm-001"
          description: Required if updating a repeating shift
        isUpdateRepeats:
          type: boolean
          example: false
          description: If true, updates all future occurrences of this repeating shift
        marketTimeZone:
          type: string
          example: "America/New_York"
        startTime:
          type: string
          example: "2024-06-01 09:00"
        endTime:
          type: string
          example: "2024-06-01 17:00"
        truckUid:
          type: string
          example: "trk-001"
        driverUid:
          type: string
          example: "drv-001"
        clientArtworkSetUid:
          type: string
          example: "art-001"
        clientGpsAddressSetUid:
          type: string
          example: "gps-001"
        shiftTypeUid:
          type: string
          example: "sht-001"
        notes:
          type: string
          example: "Updated notes"

    UpdateShiftStartedBody:
      type: object
      required: [programScheduleUid, programScheduleUids, shiftStartedTime]
      properties:
        programScheduleUid:
          type: string
          example: "ps-001"
        programScheduleUids:
          type: array
          items:
            type: string
          example: ["ps-001", "ps-002"]
          description: All schedule UIDs to mark as program-selected
        shiftStartedTime:
          type: string
          format: date-time
          example: "2024-06-01T08:05:00Z"
        trackerUid:
          type: string
          example: "trk-uid-001"
          description: Optional — links the shift start to a user tracker record

    UpdateShiftStatusBody:
      type: object
      required: [programScheduleUid, endTime]
      properties:
        programScheduleUid:
          type: string
          example: "ps-001"
        endTime:
          type: string
          format: date-time
          example: "2024-06-01T16:00:00Z"

    UploadScheduleBody:
      type: object
      required: [clientUid, clientProgramUid, markets, shifts]
      properties:
        clientUid:
          type: string
          example: "cl-001"
        clientProgramUid:
          type: string
          example: "cp-001"
        markets:
          type: array
          items:
            type: object
            properties:
              market:
                type: string
                example: "New York"
              marketTimeZone:
                type: string
                example: "America/New_York"
        shifts:
          type: array
          items:
            type: object
            properties:
              marketName:
                type: string
                example: "New York"
              truckUid:
                type: string
                example: "trk-001"
              driverUid:
                type: string
                example: "drv-001"
              startTime:
                type: string
                example: "2024-06-01 08:00"
              endTime:
                type: string
                example: "2024-06-01 16:00"
              clientArtworkSetUid:
                type: string
                example: "art-001"
              clientGpsAddressSetUid:
                type: string
                example: "gps-001"
              shiftTypeUid:
                type: string
                example: "sht-001"
              rowNum:
                type: integer
                example: 1

# ─── Paths ───────────────────────────────────────────────────────────────────
paths:

  # ── Authentication ──────────────────────────────────────────────────────────
  /authentication:
    post:
      summary: Log in and receive a JWT token
      description: |
        Authenticate with your credentials.
        The returned `token` must be sent as `Authorization: Bearer <token>` on all protected endpoints.
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  format: password
                  example: yourpassword
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  token:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  # ── Markets ─────────────────────────────────────────────────────────────────
  /markets:
    get:
      summary: Get all markets
      description: Returns a list of all available markets.
      tags: [Markets]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Markets retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Market"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  # ── Client Programs ─────────────────────────────────────────────────────────
  /client-programs/run:
    get:
      summary: List all client programs
      description: |
        Returns a paginated list of client programs.
        Supports filtering and sorting via query parameters.
      tags: [Client Programs]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
      responses:
        "200":
          description: Client programs retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedMeta"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/ClientProgram"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  /client-programs:
    post:
      summary: Create a client program
      description: |
        Creates a new client program along with its associated markets in a single transaction.
      tags: [Client Programs]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientProgramCreateBody"
      responses:
        "200":
          description: Client program created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/ClientProgram"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

    put:
      summary: Update a client program
      description: |
        Updates a client program and its markets in a single transaction.
        You can create, update, and delete markets in one call.
        
        **Note:** If `startDate` or `endDate` are changed, validation is run against 
        existing aggregated schedule data. An error is returned if shifts fall outside the new dates.
      tags: [Client Programs]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientProgramUpdateBody"
      responses:
        "200":
          description: Client program updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  /client-programs/{clientProgramUid}:
    get:
      summary: Get a client program
      description: |
        Returns full details of a client program including its associated markets 
        and aggregated metrics (miles driven, impressions, etc.).
      tags: [Client Programs]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ClientProgramUid"
      responses:
        "200":
          description: Client program found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/ClientProgram"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

    delete:
      summary: Delete a client program
      description: Soft-deletes a client program by setting `isDeleted = 1`.
      tags: [Client Programs]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ClientProgramUid"
      responses:
        "200":
          description: Client program deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /client-programs/markets/{clientProgramUid}:
    get:
      summary: Get markets for a client program
      description: Returns the raw list of markets directly associated with a client program.
      tags: [Client Programs]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ClientProgramUid"
      responses:
        "200":
          description: Markets retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ClientProgramMarket"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  # ── Trucks ──────────────────────────────────────────────────────────────────
  /trucks/run:
    get:
      summary: List all trucks
      description: Returns a paginated list of trucks. Supports filtering and sorting via query parameters.
      tags: [Trucks]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
      responses:
        "200":
          description: Trucks retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedMeta"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Truck"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  /trucks:
    post:
      summary: Create a truck
      description: |
        Adds a new truck to the system.
        The `licensePlate` is validated against **Samsara** to retrieve the vehicle's ID.
        An error is returned if the plate is not found in Samsara.
      tags: [Trucks]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TruckCreateBody"
      responses:
        "200":
          description: Truck created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Truck"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

    put:
      summary: Update a truck
      description: |
        Updates a truck's details. Optionally resolves open issues and updates the license plate.
        If `licensePlate` is changed, it is re-validated against **Samsara**.
      tags: [Trucks]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TruckUpdateBody"
      responses:
        "200":
          description: Truck updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  /trucks/no-movement:
    post:
      summary: Report no movement
      description: |
        Logs a no-movement event for a shift and sends an alert email to the fleet manager.
        The email includes the driver name, truck number, market, and shift hours.
      tags: [Trucks]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NoMovementBody"
      responses:
        "200":
          description: Alert sent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  /trucks/{truckUid}:
    get:
      summary: Get a truck
      description: |
        Returns full details of a truck including its active issues and previous issue history 
        grouped by type (truck, generator, computer, LED screens). 
        Active issues with media attachments include a temporary signed Azure URL.
      tags: [Trucks]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TruckUid"
      responses:
        "200":
          description: Truck found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Truck"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

    delete:
      summary: Delete a truck
      description: Soft-deletes a truck by setting `isDeleted = 1`.
      tags: [Trucks]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TruckUid"
      responses:
        "200":
          description: Truck deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  # ── Program Schedule ────────────────────────────────────────────────────────
  /program-schedule/run:
    get:
      summary: List all program schedules (grid view)
      description: Returns a paginated list of program schedules for grid display.
      tags: [Program Schedule]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
      responses:
        "200":
          description: Program schedules retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedMeta"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/ProgramScheduleShift"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  /program-schedule/details/run:
    get:
      summary: List program schedule details
      description: Returns a detailed, parsed view of program schedules.
      tags: [Program Schedule]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
      responses:
        "200":
          description: Program schedule details retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ProgramScheduleShift"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  /program-schedule/shifts:
    get:
      summary: Get shifts for a driver
      description: Returns scheduled shifts for a driver within a given time range.
      tags: [Program Schedule]
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: driverUid
          required: true
          schema:
            type: string
          description: UID of the driver
          example: "drv-001"
        - in: query
          name: startTime
          required: true
          schema:
            type: string
            format: date-time
          description: Range start (UTC)
          example: "2024-06-01T00:00:00Z"
        - in: query
          name: endTime
          required: true
          schema:
            type: string
            format: date-time
          description: Range end (UTC)
          example: "2024-06-30T23:59:59Z"
      responses:
        "200":
          description: Shifts retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ProgramScheduleShift"
        "400":
          description: Missing required query parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: "Missing required parameters: driverUid, startTime, endTime"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  /program-schedule/min-max:
    get:
      summary: Get schedule date range
      description: Returns the earliest start time and latest end time across all daily schedules.
      tags: [Program Schedule]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Min/max values retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      minStartTime:
                        type: string
                        format: date-time
                        example: "2024-01-01T06:00:00Z"
                      maxEndTime:
                        type: string
                        format: date-time
                        example: "2024-12-31T22:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  /program-schedule/user-info/{driverUid}:
    get:
      summary: Get user info by driver UID
      description: Returns schedule-related user information for a specific driver.
      tags: [Program Schedule]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DriverUid"
      responses:
        "200":
          description: User info retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/ProgramScheduleShift"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /program-schedule:
    post:
      summary: Create a shift
      description: |
        Creates one or more program schedule shifts.
        If repeat day fields (`monday`, `tuesday`, etc.) are provided, 
        all recurring shifts up to `repeatEndDate` are created automatically.
        
        **Validation:** Returns an error if the truck or driver is already assigned 
        at the given time.
      tags: [Program Schedule]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProgramScheduleCreateBody"
      responses:
        "200":
          description: Shift(s) created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

    put:
      summary: Update a shift (full replace)
      description: |
        Updates a program schedule shift. Set `isUpdateRepeats: true` to update all 
        future occurrences of a repeating shift.

        **Validation:** Returns an error if the truck or driver is already assigned 
        at the updated time.
      tags: [Program Schedule]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProgramScheduleUpdateBody"
      responses:
        "200":
          description: Shift updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  /program-schedule/update:
    put:
      summary: Patch a shift (partial update)
      description: Performs a direct field-level update on a schedule record by `programScheduleUid`.
      tags: [Program Schedule]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [programScheduleUid]
              properties:
                programScheduleUid:
                  type: string
                  example: "ps-001"
      responses:
        "200":
          description: Shift patched successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  /program-schedule/update-shift-started:
    put:
      summary: Mark shift as started
      description: |
        Records the time a shift was started and clears `noProgramSelected` 
        for a set of related schedule UIDs. Optionally updates a user tracker record.
      tags: [Program Schedule]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateShiftStartedBody"
      responses:
        "200":
          description: Shift marked as started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  /program-schedule/update-shift-status:
    put:
      summary: Update shift end status
      description: |
        Creates or confirms a `ProgramShift` record for the given schedule UID, 
        recording the shift's end time.
      tags: [Program Schedule]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateShiftStatusBody"
      responses:
        "200":
          description: Shift status updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  /program-schedule/upload:
    post:
      summary: Bulk upload shifts
      description: |
        Bulk-creates markets and shifts from an uploaded dataset (e.g. from a spreadsheet).

        - Markets are created first; existing ones are matched by name.
        - Each shift is validated for conflicts before insertion.
        - If **any** shift has a conflict or is in the past, the response returns 
          `hasError: true` with per-shift `statusMessage` fields — no shifts are saved.
        - If all shifts are valid, they are saved in a single transaction.
      tags: [Program Schedule]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadScheduleBody"
      responses:
        "200":
          description: Upload processed (check `hasError` in response body)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  hasError:
                    type: boolean
                    example: false
                    description: True if any shifts had validation errors — nothing was saved
                  markets:
                    type: array
                    items:
                      $ref: "#/components/schemas/ClientProgramMarket"
                  shifts:
                    type: array
                    items:
                      allOf:
                        - $ref: "#/components/schemas/ProgramScheduleShift"
                        - type: object
                          properties:
                            statusMessage:
                              type: string
                              example: "Truck/Driver is already assigned for the given shift time."
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  /program-schedule/{id}:
    delete:
      summary: Delete a shift
      description: |
        Deletes a program schedule shift by ID.

        - If the shift is **today** and the driver is already clocked in, deletion is blocked.
        - If the shift is part of a **repeating group** with only one remaining occurrence, 
          the repeat mapping is also deleted.
      tags: [Program Schedule]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ScheduleId"
      responses:
        "200":
          description: Shift deleted (or blocked with reason)
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      success:
                        type: boolean
                        example: false
                      error:
                        type: object
                        properties:
                          type:
                            type: string
                            example: "ClockedIn"
                          message:
                            type: string
                            example: "Unable to Delete. Shift Already Clocked In"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

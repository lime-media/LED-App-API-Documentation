openapi: 3.0.0
info:
  title: LED App API
  version: 1.0.0
  description: |
    Official API documentation for the LED App.
    All protected endpoints require a Bearer JWT token in the `Authorization` header.

    **How to authenticate:**
    1. Call `POST /authentication` with your credentials.
    2. Copy the `token` from the response.
    3. Click **Authorize** and enter: `Bearer <your_token>`
  contact:
    name: Your Company Name
    email: support@yourcompany.com

servers:
  - url: https://your-api-domain.com
    description: Production server
  - url: http://localhost:3000
    description: Local development server

tags:
  - name: Authentication
    description: Login and token management
  - name: Client Programs
    description: Retrieve client programs and their associated markets
  - name: Trucks
    description: Retrieve truck information
  - name: Program Schedule
    description: Retrieve program schedule shifts
  - name: Markets
    description: Retrieve available markets

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ClientProgramUid:
      in: path
      name: clientProgramUid
      required: true
      schema:
        type: string
      description: Unique identifier of the client program

    TruckUid:
      in: path
      name: truckUid
      required: true
      schema:
        type: string
      description: Unique identifier of the truck

    DriverUid:
      in: path
      name: driverUid
      required: true
      schema:
        type: string
      description: Unique identifier of the driver

    LimitParam:
      in: query
      name: limit
      required: false
      schema:
        type: integer
        example: 20
      description: Maximum number of records to return

    OffsetParam:
      in: query
      name: offset
      required: false
      schema:
        type: integer
        example: 0
      description: Number of records to skip (for pagination)

  responses:
    Unauthorized:
      description: Missing or invalid JWT token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "An error occurred"

    PaginatedMeta:
      type: object
      properties:
        success:
          type: boolean
          example: true
        count:
          type: integer
          example: 42
          description: Total number of records (before pagination)

    Market:
      type: object
      properties:
        marketUid:
          type: string
          example: "mkt-001"
        market:
          type: string
          example: "New York"
        marketTimeZone:
          type: string
          example: "America/New_York"

    ClientProgramMarket:
      type: object
      properties:
        clientProgramMarketUid:
          type: string
          example: "cpm-001"
        clientProgramUid:
          type: string
          example: "cp-001"
        market:
          type: string
          example: "New York"
        marketTimeZone:
          type: string
          example: "America/New_York"
        marketMilesDriven:
          type: number
          example: 120.5
        impressions:
          type: integer
          example: 5000

    ClientProgram:
      type: object
      properties:
        clientProgramUid:
          type: string
          example: "cp-001"
        clientUid:
          type: string
          example: "cl-001"
        programName:
          type: string
          example: "Summer Campaign 2024"
        startDate:
          type: string
          format: date
          example: "2024-06-01"
        endDate:
          type: string
          format: date
          example: "2024-08-31"
        isDeleted:
          type: integer
          enum: [0, 1]
          example: 0
        markets:
          type: array
          items:
            $ref: "#/components/schemas/ClientProgramMarket"
        aggregatedValues:
          type: object
          description: Aggregated metrics for the program (miles, impressions, etc.)

    Issue:
      type: object
      properties:
        issueUid:
          type: string
          example: "iss-001"
        issueType:
          type: string
          enum: [truck, generator, computer, ledScreens]
          example: "truck"
        issue:
          type: string
          example: "Engine warning light on"
        issueMediaOriginalName:
          type: string
          example: "photo.jpg"
        issueMediaSasUrl:
          type: string
          example: "https://storage.azure.com/..."
          description: Temporary signed URL for issue media (active issues only)
        isResolved:
          type: integer
          enum: [0, 1]
          example: 0
        createdAt:
          type: string
          format: date-time

    Truck:
      type: object
      properties:
        truckUid:
          type: string
          example: "trk-001"
        truckNumber:
          type: string
          example: "T-42"
        licensePlate:
          type: string
          example: "ABC-1234"
        macAddress:
          type: string
          example: "AA:BB:CC:DD:EE:FF"
        samsaraId:
          type: string
          example: "sam-9876"
        isDeleted:
          type: integer
          enum: [0, 1]
          example: 0
        activeIssues:
          type: array
          items:
            $ref: "#/components/schemas/Issue"
        previousTruckIssues:
          type: array
          items:
            $ref: "#/components/schemas/Issue"
        previousGeneratorIssues:
          type: array
          items:
            $ref: "#/components/schemas/Issue"
        previousComputerIssues:
          type: array
          items:
            $ref: "#/components/schemas/Issue"
        previousLedScreenIssues:
          type: array
          items:
            $ref: "#/components/schemas/Issue"

    ProgramScheduleShift:
      type: object
      properties:
        programScheduleUid:
          type: string
          example: "ps-001"
        clientUid:
          type: string
          example: "cl-001"
        clientProgramUid:
          type: string
          example: "cp-001"
        clientProgramMarketUid:
          type: string
          example: "cpm-001"
        truckUid:
          type: string
          example: "trk-001"
        driverUid:
          type: string
          example: "drv-001"
        startTime:
          type: string
          format: date-time
          example: "2024-06-01T08:00:00Z"
        endTime:
          type: string
          format: date-time
          example: "2024-06-01T16:00:00Z"
        shiftDurationInMins:
          type: integer
          example: 480
        notes:
          type: string
          example: "Park near main entrance"
        hasShiftCompleted:
          type: integer
          enum: [0, 1]

paths:

  # ── Authentication ──────────────────────────────────────────────────────────
  /authentication:
    post:
      summary: Log in and receive a JWT token
      description: |
        Authenticate with your credentials.
        The returned `token` must be sent as `Authorization: Bearer <token>` on all protected endpoints.
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  format: password
                  example: yourpassword
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  token:
                    type: string
                    example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        "400":
          $ref: "#/components/responses/Unauthorized"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  # ── Markets ─────────────────────────────────────────────────────────────────
  /markets:
    get:
      summary: Get all markets
      description: Returns a list of all available markets.
      tags: [Markets]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Markets retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Market"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  # ── Client Programs ─────────────────────────────────────────────────────────
  /client-programs/run:
    get:
      summary: List all client programs
      description: Returns a paginated list of client programs.
      tags: [Client Programs]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
      responses:
        "200":
          description: Client programs retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedMeta"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/ClientProgram"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  /client-programs/{clientProgramUid}:
    get:
      summary: Get a client program
      description: |
        Returns full details of a client program including its associated markets
        and aggregated metrics (miles driven, impressions, etc.).
      tags: [Client Programs]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ClientProgramUid"
      responses:
        "200":
          description: Client program found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/ClientProgram"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  /client-programs/markets/{clientProgramUid}:
    get:
      summary: Get markets for a client program
      description: Returns the list of markets associated with a specific client program.
      tags: [Client Programs]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ClientProgramUid"
      responses:
        "200":
          description: Markets retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ClientProgramMarket"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  # ── Trucks ──────────────────────────────────────────────────────────────────
  /trucks/run:
    get:
      summary: List all trucks
      description: Returns a paginated list of trucks.
      tags: [Trucks]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
      responses:
        "200":
          description: Trucks retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedMeta"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/Truck"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  /trucks/{truckUid}:
    get:
      summary: Get a truck
      description: |
        Returns full details of a truck including its active issues and previous issue
        history grouped by type (truck, generator, computer, LED screens).
        Active issues with media attachments include a temporary signed Azure URL.
      tags: [Trucks]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TruckUid"
      responses:
        "200":
          description: Truck found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Truck"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"

  # ── Program Schedule ────────────────────────────────────────────────────────
  /program-schedule/run:
    get:
      summary: List all program schedules
      description: Returns a paginated list of program schedules for grid display.
      tags: [Program Schedule]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
      responses:
        "200":
          description: Program schedules retrieved successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/PaginatedMeta"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/ProgramScheduleShift"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  /program-schedule/details/run:
    get:
      summary: List program schedule details
      description: Returns a detailed, parsed view of program schedules.
      tags: [Program Schedule]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
      responses:
        "200":
          description: Program schedule details retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ProgramScheduleShift"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  /program-schedule/shifts:
    get:
      summary: Get shifts for a driver
      description: Returns scheduled shifts for a driver within a given time range.
      tags: [Program Schedule]
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: driverUid
          required: true
          schema:
            type: string
          description: UID of the driver
          example: "drv-001"
        - in: query
          name: startTime
          required: true
          schema:
            type: string
            format: date-time
          description: Range start (UTC)
          example: "2024-06-01T00:00:00Z"
        - in: query
          name: endTime
          required: true
          schema:
            type: string
            format: date-time
          description: Range end (UTC)
          example: "2024-06-30T23:59:59Z"
      responses:
        "200":
          description: Shifts retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ProgramScheduleShift"
        "400":
          description: Missing required query parameters
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  error:
                    type: string
                    example: "Missing required parameters: driverUid, startTime, endTime"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  /program-schedule/min-max:
    get:
      summary: Get schedule date range
      description: Returns the earliest start time and latest end time across all daily schedules.
      tags: [Program Schedule]
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Min/max values retrieved
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      minStartTime:
                        type: string
                        format: date-time
                        example: "2024-01-01T06:00:00Z"
                      maxEndTime:
                        type: string
                        format: date-time
                        example: "2024-12-31T22:00:00Z"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/ServerError"

  /program-schedule/user-info/{driverUid}:
    get:
      summary: Get user info by driver UID
      description: Returns schedule-related user information for a specific driver.
      tags: [Program Schedule]
      security:
        - BearerAuth: []
      parameters:
        - $ref: "#/components/parameters/DriverUid"
      responses:
        "200":
          description: User info retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/ProgramScheduleShift"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/ServerError"
